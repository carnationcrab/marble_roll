<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Avoid stale menu when refreshing during development; use a hard refresh if the start screen looks old. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>nova roll</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230e1c2e'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260403t" />
  <link rel="stylesheet" href="crtOverlay.css?v=20260403t" />
  <script type="importmap">
  {
    "imports": {
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>
  <!-- Bootstraps without a separate fetch; keeps New game working if levels.json requests fail. -->
  <script type="application/json" id="marble-level-manifest">
{"schemaVersion":2,"procgen":true,"infiniteLevels":true}
  </script>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas" tabindex="0"></canvas>
    <div id="ui-root" aria-live="polite">
      <div id="screen-menu" class="screen screen--visible">
        <div class="menu-panel hud-panel">
          <h1 id="menu-heading" class="menu-heading menu-heading--glitch">nova roll</h1>
          <p class="menu-subtitle" id="menu-subtitle">CONTROLS</p>
          <p class="keys" id="menu-keys">
            <span class="keys__line"><strong class="keys__action">Move</strong><span class="keys__binding">WASD</span></span>
            <span class="keys__line"><strong class="keys__action">Jump</strong><span class="keys__binding">Space</span></span>
            <span class="keys__line"><strong class="keys__action">Brake</strong><span class="keys__binding">Shift</span></span>
            <span class="keys__line"><strong class="keys__action">Camera</strong><span class="keys__binding">arrows</span></span>
            <span class="keys__line"><strong class="keys__action">Restart</strong><span class="keys__binding">R</span></span>
            <span class="keys__line"><strong class="keys__action">Mute</strong><span class="keys__binding">M</span></span>
          </p>
          <div class="menu-actions">
            <button type="button" id="btn-new-game" class="btn-primary btn-primary--cyber btn-primary--glitch">
              <span class="btn-primary__label">new game</span>
            </button>
          </div>
        </div>
        <p
          class="menu-build"
          id="menu-build"
          title="If this line is missing, the browser or server is not loading this folder’s index.html"
        >
          build 20260403t
        </p>
        <label class="dev-mode-label">
          <input type="checkbox" id="dev-mode" />
          dev mode (skip level)
        </label>
        <span class="btn-mute-wrap btn-mute-wrap--menu-corner">
          <button
            type="button"
            id="btn-menu-music-mute"
            class="btn-mute btn-mute--menu-corner"
            aria-pressed="false"
            aria-label="Mute music"
            aria-describedby="tooltip-menu-mute"
          >
            <span class="btn-mute__label" aria-hidden="true">|&gt;</span>
          </button>
          <span id="tooltip-menu-mute" class="btn-mute__tooltip" role="tooltip">Mute</span>
        </span>
      </div>
      <div
        id="screen-credits"
        class="screen credits-screen"
        hidden
        aria-hidden="true"
        role="dialog"
        aria-modal="true"
        aria-label="Credits"
      >
        <div class="credits-panel hud-panel menu-panel">
          <div id="credits-body" class="credits-panel__body"></div>
          <button type="button" id="btn-credits-close" class="btn-primary btn-primary--cyber credits-panel__close">
            <span class="btn-primary__label">close</span>
          </button>
        </div>
      </div>
      <div id="loading-overlay" class="loading-overlay" hidden aria-busy="true" aria-live="polite">
        <div class="loading-overlay__scrim" aria-hidden="true"></div>
        <div class="loading-overlay__card" role="status">
          <h2 id="loading-overlay-title" class="loading-overlay__title">Generating course…</h2>
          <p id="loading-phase" class="loading-overlay__phase"></p>
          <progress
            id="loading-progress"
            max="100"
            value="0"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          ></progress>
        </div>
      </div>
      <div id="screen-marble-dead" class="screen" hidden>
        <h2 id="death-heading">Out of bounds</h2>
        <p class="hint" id="death-hint">You fell too far. Press the button or R to try again.</p>
        <div class="marble-dead-actions">
          <button type="button" id="btn-try-again" class="btn-primary btn-primary--cyber btn-primary--glitch">
            <span class="btn-primary__label">try again</span>
          </button>
        </div>
      </div>
      <div id="screen-run-game-over" class="screen screen--run-over" hidden>
        <h2 id="run-over-heading">Run over</h2>
        <p class="hint" id="run-over-hint"></p>
        <p class="hint run-over-coins" id="run-over-coins" hidden></p>
        <div class="run-over-actions">
          <button type="button" id="btn-run-restart" class="btn-primary btn-primary--cyber btn-primary--glitch">
            <span class="btn-primary__label">restart from level 1</span>
          </button>
          <button type="button" id="btn-run-menu" class="btn-primary btn-primary--cyber">
            <span class="btn-primary__label">main menu</span>
          </button>
        </div>
        <div id="run-over-dev-actions" class="run-over-dev-actions" hidden>
          <button type="button" id="btn-dev-run-restart-current-level" class="btn-primary btn-primary--cyber">
            <span class="btn-primary__label">restart this level</span>
          </button>
        </div>
      </div>
      <div id="screen-level-complete" class="screen" hidden>
        <h2 id="level-complete-title">Level complete</h2>
        <p id="level-complete-scores" class="level-complete-scores" hidden></p>
        <p id="level-complete-msg" class="hint">Press Enter to continue.</p>
        <button type="button" id="btn-continue" class="btn-primary btn-primary--cyber">
          <span class="btn-primary__label">next level</span>
        </button>
      </div>
      <div id="hud" class="hud" hidden>
        <aside class="hud-panel hud-legend" id="hud-controls-legend" aria-label="Controls"></aside>
        <div class="hud-panel hud-centre">
          <div class="hud-row hud-row--title"><span id="hud-level-name"></span></div>
          <div class="hud-row hud-row--falls" id="hud-falls-row" aria-label="Falls this run">
            <span class="hud-fall-char" data-fall-index="0">X</span>
            <span class="hud-fall-char" data-fall-index="1">X</span>
            <span class="hud-fall-char" data-fall-index="2">X</span>
          </div>
          <div class="hud-row hud-row--coins"><span id="hud-coins-level"></span><span class="hud-sep" aria-hidden="true">·</span><span id="hud-coins-run"></span></div>
        </div>
        <div class="hud-hfill">
          <div class="hud-stack-right">
            <div class="music-mute music-mute--hud hud-panel" id="hud-music-mute-wrap">
              <span class="btn-mute-wrap btn-mute-wrap--hud">
                <button
                  type="button"
                  id="btn-hud-music-mute"
                  class="btn-mute"
                  aria-pressed="false"
                  aria-label="Mute music"
                  aria-describedby="tooltip-hud-mute"
                >
                  <span class="btn-mute__label" aria-hidden="true">|&gt;</span>
                </button>
                <span id="tooltip-hud-mute" class="btn-mute__tooltip" role="tooltip">Mute</span>
              </span>
            </div>
            <div id="dev-bypass-wrap" class="dev-bypass-wrap" hidden>
              <button type="button" id="btn-dev-skip-level" class="btn-dev">Skip level</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js?v=20260403m"></script>
</body>
</html>
